<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Найти исполнителя</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <header class="page-header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="page-title">Найти исполнителя</div>
      <div class="header-spacer"></div>
    </header>

    <main class="content">

      <section class="form-card">
        <div class="max-badge">заявка</div>

        <h1>Разместить задание</h1>

        <p>
          Опишите, кого вы ищете и какие работы нужно выполнить.
        </p>

        <form class="request-form" onsubmit="submitContractorRequest(event)">

          <label>
            Заголовок заявки
            <input id="title" name="title" type="text" placeholder="Например: Нужны монолитчики" required>
          </label>

          <label>
            Подробности
            <textarea id="description" name="description" placeholder="Опишите объемы, сроки, материалы, требования и важные детали"></textarea>
          </label>

          <label>
            Город
            <input id="city" name="city" type="text" placeholder="Например: Москва">
          </label>

          <div class="form-group">
            <div class="form-label">Кого ищете</div>

            <label class="checkbox-row">
              <input type="checkbox" name="performers" value="Субподрядчик">
              <span>Субподрядчик</span>
            </label>

            <label class="checkbox-row">
              <input type="checkbox" name="performers" value="Бригада">
              <span>Бригада</span>
            </label>

            <label class="checkbox-row">
              <input type="checkbox" name="performers" value="Мастер">
              <span>Мастер</span>
            </label>

            <label class="checkbox-row">
              <input type="checkbox" name="performers" value="Поставщик">
              <span>Поставщик</span>
            </label>
          </div>

          <label>
            Требуется СРО
            <select id="sro" name="sro">
              <option>Не важно</option>
              <option>Да</option>
              <option>Нет</option>
            </select>
          </label>

          <label>
            Категория работ
            <select id="category" name="category">
              <option value="">Выберите категорию</option>
              <option>Аренда спецтехники</option>
              <option>Бетонные/монолитные работы</option>
              <option>Вентиляция и кондиционирование</option>
              <option>Высотные работы</option>
              <option>Гидроизоляционные работы</option>
              <option>Демонтажные работы</option>
              <option>Дорожные и земляные работы</option>
              <option>Каменные/кирпичные работы</option>
              <option>Клининг</option>
              <option>Кровельные работы</option>
              <option>Малярные работы</option>
              <option>Монтажные работы</option>
              <option>Монтаж свай/фундаментов</option>
              <option>Монтаж трубопроводов</option>
              <option>Общестроительные работы</option>
              <option>Отделочные работы</option>
              <option>Поставки стройматериалов</option>
              <option>Проектные работы</option>
              <option>Работы по возведению зданий</option>
              <option>Сварка металлоконструкций</option>
              <option>Системы безопасности и связи</option>
              <option>Системы водоснабжения</option>
              <option>Стекольные работы</option>
              <option>Столярные и плотницкие работы</option>
              <option>Строительство прочих сооружений</option>
              <option>Строительство трубопроводов</option>
              <option>Теплоизоляционные работы</option>
              <option>Транспортные услуги</option>
              <option>Устройство полов</option>
              <option>Обойные и плиточные работы</option>
              <option>Фасадные работы</option>
              <option>Штукатурные работы</option>
              <option>Электромонтажные работы</option>
            </select>
          </label>

          <div class="price-grid">
            <label>
              Цена от
              <input id="priceFrom" name="priceFrom" type="number" placeholder="0">
            </label>

            <label>
              Цена до
              <input id="priceTo" name="priceTo" type="number" placeholder="0">
            </label>
          </div>

          <label>
            Способ связи
            <select id="contactType" name="contactType">
              <option>Телефон</option>
              <option>Email</option>
            </select>
          </label>

          <label>
            Контакт
            <input id="contact" name="contact" type="text" placeholder="Введите телефон или email" required>
          </label>

          <label>
            Документы
            <input id="documents" name="documents" type="file" multiple>
          </label>

          <button type="submit" class="submit-button">
            Подать заявку
          </button>

        </form>
      </section>

      <button class="home-button" onclick="goHome()">На главную</button>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
