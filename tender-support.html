<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Тендерное сопровождение</title><link rel="stylesheet" href="/style.css"></head><body><div class="app"><header class="page-header"><button class="back-btn" onclick="goHome()">←</button><div class="page-title">Тендерное сопровождение</div><div class="header-spacer"></div></header><main class="content"><section class="hero-card section-hero section-card-blue"><div class="section-hero-top"><div class="section-icon">🤝</div><div><div class="section-mini-title">сервис партнёров</div><h1 class="section-hero-title">Тендерное сопровождение</h1></div></div><p class="section-description">Помощь с подбором закупок, заявками и документами.</p><div class="section-action-row"><span class="inline-status">В разработке</span><span class="inline-status">Заявки уже заложены</span></div></section><section class="form-card"><h2>Оставить заявку</h2><form onsubmit="sendPartner(event,'Тендерное сопровождение')"><label>Имя *</label><input name="name" required><label>Телефон *</label><input name="phone" required><label>ИНН компании</label><input name="inn"><label>Город</label><input name="city"><label>Что нужно?</label><textarea name="comment"></textarea><button class="submit-button">Отправить заявку</button></form></section><button class="home-button" onclick="goHome()">На главную</button></main></div><script src="/app-core.js"></script><script src="/script.js"></script><script>function sendPartner(e,section){e.preventDefault();const f=e.target;SP.partnerRequest(section,{name:f.name.value,phone:f.phone.value,inn:f.inn.value,city:f.city.value,comment:f.comment.value});alert('Заявка отправлена. В админке она появится в партнёрских заявках.');e.target.reset();}</script><script src="/old-bugs-fix.js"></script>\n<script src="/registration-overlay-fix.js"></script>
<script src="/human-logs-fix.js"></script>
</body></html>
