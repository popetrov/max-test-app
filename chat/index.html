<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Закрытый чат</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .chat-shell{background:rgba(255,255,255,.88);border:1px solid rgba(30,98,170,.14);border-radius:24px;box-shadow:0 18px 45px rgba(21,68,120,.16);padding:14px;margin-bottom:16px}
    .chat-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .chat-admin{background:rgba(32,168,245,.08);border:1px solid rgba(32,168,245,.22);border-radius:18px;padding:12px;margin-bottom:12px}
    .chat-list{height:430px;overflow:auto;background:#f8fbff;border:1px solid rgba(30,98,170,.12);border-radius:18px;padding:12px;display:flex;flex-direction:column;gap:10px}
    .chat-message{max-width:78%;align-self:flex-start;background:#ffffff;border:1px solid rgba(30,98,170,.10);border-radius:18px;padding:11px 12px;color:#172234;box-shadow:0 8px 20px rgba(21,68,120,.08)}
    .chat-message.mine{align-self:flex-end;background:linear-gradient(135deg,#2f8bf0,#1278ff);color:#fff}
    .chat-author{font-weight:950;margin-bottom:4px}
    .chat-text{line-height:1.35;white-space:pre-wrap;word-break:break-word}
    .chat-meta{font-size:12px;opacity:.76;text-align:right;margin-top:6px}
    .chat-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .chat-actions button{min-height:34px!important;border:0;border-radius:10px;padding:7px 10px;font-weight:800;cursor:pointer}
    .chat-form{display:grid;grid-template-columns:52px 1fr 128px;gap:8px;margin-top:12px}
    .chat-file{width:52px!important;min-height:52px!important;border:0!important;border-radius:16px!important;background:rgba(32,168,245,.10)!important;display:grid!important;place-items:center!important;cursor:pointer!important;color:#147ed0!important;font-size:22px!important;padding:0!important}
    .chat-input{min-height:52px!important}
    .chat-send{min-height:52px!important}
    .paywall-card{background:rgba(255,255,255,.88);border:1px solid rgba(30,98,170,.14);border-radius:24px;box-shadow:0 18px 45px rgba(21,68,120,.16);padding:22px}
    @media(max-width:640px){.chat-form{grid-template-columns:48px 1fr}.chat-send{grid-column:1/-1}.chat-message{max-width:92%}}
  </style>
</head>
<body>
<div class="app">
  <header class="page-header">
    <button class="back-btn" onclick="location.href='/'">←</button>
    <div class="page-title">Закрытый чат</div>
    <div class="header-spacer"></div>
  </header>

  <main class="content" id="chatRoot"></main>
</div>

<script src="/app-core.js"></script>
<script src="/script.js"></script>
<script>
function readUser(){
  try { return JSON.parse(localStorage.getItem('sp_user') || '{}'); }
  catch(e){ return {}; }
}

function currentName(){
  const u = readUser();
  return u.displayName || u.name || 'Пользователь';
}

function isAdmin(){
  const u = readUser();
  return ['admin','owner'].includes(u.role);
}

function hasChatAccess(){
  const u = readUser();
  return isAdmin() || ['orders','pro','paid','paid_user'].includes(u.plan);
}

function cleanOldChatIdentity(){
  ['chatUser','chat_username','currentChatUser','chatAuthor'].forEach(k => localStorage.removeItem(k));
  localStorage.setItem('chatUserName', currentName());
}

function loadMessages(){
  try {
    return JSON.parse(localStorage.getItem('sp_chat_messages') || '[]');
  } catch(e) {
    return [];
  }
}

function saveMessages(list){
  localStorage.setItem('sp_chat_messages', JSON.stringify(list.slice(-100)));
}

function seedMessages(){
  const existing = loadMessages();
  if(existing.length) return;

  saveMessages([
    {
      id: Date.now() - 20000,
      author: 'Система',
      text: 'Добро пожаловать в закрытый чат. Контакты и рабочие обсуждения доступны по тарифу.',
      time: new Date(Date.now() - 20000).toISOString(),
      system: true
    }
  ]);
}

function renderPaywall(){
  document.getElementById('chatRoot').innerHTML = `
    <section class="paywall-card">
      <div class="section-hero-top">
        <div class="section-icon">🔒</div>
        <div>
          <div class="section-mini-title">доступ по тарифу</div>
          <h1 class="section-hero-title">Закрытый чат недоступен</h1>
        </div>
      </div>
      <p class="section-description">
        Читать и писать в закрытый чат могут пользователи с тарифом «Заказы» или PRO.
      </p>
      <div class="card-actions">
        <button class="submit-button" onclick="location.href='/subscription/'">Открыть тарифы</button>
        <button class="reset-button" onclick="location.href='/'">На главную</button>
      </div>
    </section>
  `;
}

function renderChat(){
  cleanOldChatIdentity();
  seedMessages();

  const adminBlock = isAdmin() ? `
    <div class="chat-admin">
      <b>Админ-панель</b>
      <div class="chat-toolbar">
        <button class="admin-btn primary" onclick="pinMessage()">Добавить / изменить закреп</button>
        <button class="admin-btn bad" onclick="clearChat()">Очистить чат</button>
      </div>
    </div>
  ` : '';

  document.getElementById('chatRoot').innerHTML = `
    <section class="hero-card section-hero">
      <div class="section-hero-top">
        <div class="section-icon">💬</div>
        <div>
          <div class="section-mini-title">для оплативших пользователей</div>
          <h1 class="section-hero-title">Закрытый чат</h1>
        </div>
      </div>
      <p class="section-description">Вы пишете как: <b>${escapeHtml(currentName())}</b></p>
      <div class="section-action-row">
        <span class="inline-status">Доступ открыт</span>
        <span class="inline-status">${isAdmin() ? 'Админ' : 'Тариф'}</span>
      </div>
    </section>

    <section class="chat-shell">
      ${adminBlock}
      <div id="chatList" class="chat-list"></div>
      <div class="chat-form">
        <button class="chat-file" onclick="fakeFileAttach()">📎</button>
        <input id="chatInput" class="chat-input" placeholder="Введите сообщение...">
        <button class="submit-button chat-send" onclick="sendChatMessage()">Отправить</button>
      </div>
    </section>
  `;

  drawMessages();
  document.getElementById('chatInput').addEventListener('keydown', e => {
    if(e.key === 'Enter') sendChatMessage();
  });
}

function drawMessages(){
  const list = loadMessages();
  const box = document.getElementById('chatList');
  if(!box) return;

  const me = currentName();

  box.innerHTML = list.map(msg => {
    const mine = msg.author === me;
    return `
      <div class="chat-message ${mine ? 'mine' : ''}">
        <div class="chat-author">${escapeHtml(msg.author || 'Пользователь')}${isAdmin() && msg.author === me ? ' 👑' : ''}</div>
        <div class="chat-text">${escapeHtml(msg.text || '')}</div>
        <div class="chat-meta">${new Date(msg.time || Date.now()).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</div>
        ${isAdmin() && !msg.system ? `<div class="chat-actions"><button onclick="deleteMessage(${msg.id})">Удалить</button></div>` : ''}
      </div>
    `;
  }).join('');

  box.scrollTop = box.scrollHeight;
}

function sendChatMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;

  const list = loadMessages();
  list.push({
    id: Date.now(),
    author: currentName(),
    text,
    time: new Date().toISOString()
  });

  saveMessages(list);
  input.value = '';
  drawMessages();
}

function deleteMessage(id){
  saveMessages(loadMessages().filter(m => m.id !== id));
  drawMessages();
}

function clearChat(){
  if(!isAdmin()) return;
  if(confirm('Очистить чат?')){
    saveMessages([]);
    seedMessages();
    drawMessages();
  }
}

function pinMessage(){
  if(!isAdmin()) return;
  alert('Закреп добавим следующим этапом. Сейчас чат уже работает стабильно.');
}

function fakeFileAttach(){
  alert('Файлы в чате подключим после стабилизации. Сейчас лучше не ломать чат.');
}

function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

document.addEventListener('DOMContentLoaded', () => {
  if(hasChatAccess()) renderChat();
  else renderPaywall();
});
</script>
<script src="/registration-overlay-fix.js"></script>
<script src="/human-logs-fix.js"></script>
</body>
</html>
